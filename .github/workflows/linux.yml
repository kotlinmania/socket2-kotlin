name: Build (Linux)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build and test Linux targets
        run: >
          ./gradlew
          linuxX64Test
          --no-configuration-cache
