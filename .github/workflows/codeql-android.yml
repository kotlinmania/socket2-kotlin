name: CodeQL (Android)

# Android-specific Java/Kotlin extraction pass.
#
# This is the only CodeQL workflow that installs Android. It builds the Android
# target so CodeQL's Java/Kotlin Android framework queries see an Android-shaped
# build without making Windows, Linux, or synthetic JVM scans pay for SDK setup.

on:
  workflow_call:

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

jobs:
  analyze:
    name: Analyze (android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          dependency-caching: true

      - name: Install Android platform
        run: sdkmanager "platforms;android-34"

      - name: Build Android extraction target
        run: |
          export JAVA_TOOL_OPTIONS="-javaagent:${CODEQL_EXTRACTOR_JAVA_ROOT}/tools/codeql-java-agent.jar=java,kotlin"
          echo "JAVA_TOOL_OPTIONS=${JAVA_TOOL_OPTIONS}"
          ./gradlew --no-daemon --project-dir codeql-build codeqlCompileAndroid -Pkotlinmania.codeql=true --no-configuration-cache

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin-android"
